name: Booking Check

on:
  schedule:
    - cron: '30 1 * * *' # 매일 KST 10:30 (UTC 01:30)
  workflow_dispatch: # GitHub UI에서 수동 실행 가능

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check date range
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          END_DATE="2026-06-22"
          if [[ "$TODAY" > "$END_DATE" ]]; then
            echo "📅 실행 기간 종료 ($TODAY > $END_DATE). 스킵합니다."
            exit 0
          fi
          echo "📅 실행 날짜: $TODAY (종료일: $END_DATE)"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run booking check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          npx ts-node src/checker.ts \
            --name "${{ vars.HOTEL_NAME }}" \
            --checkin "${{ vars.CHECKIN }}" \
            --checkout "${{ vars.CHECKOUT }}" \
            --guests "${{ vars.GUESTS }}" \
            --notify \
            --notify-always \
            --headless
